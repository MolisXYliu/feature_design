name: Build Electron App

on:
  push:
    tags:
      - "v*"
    branches:
      - feature/gitaction
  workflow_dispatch: # 支持手动触发

concurrency:
  group: build-electron-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            script: dist:win
          - os: ubuntu-latest
            platform: linux
            script: dist

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Decrypt .env for build
        run: node scripts/env-crypt.mjs decrypt-file .env
        env:
          ENV_ENCRYPTION_KEY: ${{ secrets.ENV_ENCRYPTION_KEY }}

      - name: Install dependencies (Windows with optional deps fallback)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm install --include=optional
          if (-not (Test-Path "node_modules/@rollup/rollup-win32-x64-msvc")) {
            Write-Host "Missing @rollup/rollup-win32-x64-msvc, retry with clean install..."
            Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
            Remove-Item -Force package-lock.json -ErrorAction SilentlyContinue
            npm install --include=optional
          }

      - name: Install dependencies (Linux with optional deps fallback)
        if: runner.os == 'Linux'
        run: |
          npm install --include=optional
          if [ ! -d "node_modules/@rollup/rollup-linux-x64-gnu" ]; then
            echo "Missing @rollup/rollup-linux-x64-gnu, retry with clean install..."
            rm -rf node_modules package-lock.json
            npm install --include=optional
          fi
          # Install tools needed to manipulate AppImage and squashfs during CI so we can set SUID on chrome-sandbox
          sudo apt-get update -y
          sudo apt-get install -y squashfs-tools libarchive-tools || true
          # Download appimagetool (used to repackage extracted AppImage) to /usr/local/bin
          if [ ! -x /usr/local/bin/appimagetool ]; then
            echo "Downloading appimagetool..."
            tmpfile=$(mktemp)
            curl -sSL "https://github.com/AppImage/AppImageKit/releases/latest/download/appimagetool-x86_64.AppImage" -o "$tmpfile" || true
            if [ -f "$tmpfile" ]; then
              chmod +x "$tmpfile"
              sudo mv "$tmpfile" /usr/local/bin/appimagetool || sudo cp "$tmpfile" /usr/local/bin/appimagetool || true
              sudo chmod +x /usr/local/bin/appimagetool || true
            fi
          fi

      - name: Build
        run: npm run build

      - name: Get package version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package
        run: npx electron-builder --${{ matrix.platform == 'linux' && 'linux deb AppImage' || matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix chrome-sandbox permissions (Linux)
        if: matrix.platform == 'linux'
        run: |
          set -e
          echo "Setting setuid on any chrome-sandbox found in dist/...-unpacked"
          # Set the SUID bit on any chrome-sandbox inside unpacked directories (dir target / linux-unpacked)
          find dist -type f -name "chrome-sandbox" -print0 | xargs -0 -r chmod 4755 || true

          # Try to fix chrome-sandbox inside AppImage if one was produced
          for app in dist/*.AppImage; do
            if [ -f "$app" ]; then
              echo "Found AppImage: $app. Attempting to extract, fix permissions, and repackage if possible."
              # --appimage-extract will create squashfs-root in CWD; run in tempdir
              tmp=$(mktemp -d)
              pushd "$tmp" >/dev/null
              "$app" --appimage-extract >/dev/null 2>&1 || true
              if [ -d squashfs-root ]; then
                find squashfs-root -type f -name "chrome-sandbox" -exec chmod 4755 {} \; || true
                if command -v appimagetool >/dev/null 2>&1; then
                  echo "Repacking AppImage using appimagetool"
                  appimagetool squashfs-root "${app}.fixed" >/dev/null || true
                  if [ -f "${app}.fixed" ]; then
                    mv "${app}.fixed" "$app"
                    chmod +x "$app"
                  fi
                else
                  echo "appimagetool not found; fixed permissions inside extracted AppImage but cannot repackage. Consider installing appimagetool in the runner or ensure chrome-sandbox is SUID prior to AppImage creation."
                fi
                rm -rf squashfs-root
              else
                echo "Could not extract AppImage $app"
              fi
              popd >/dev/null
              rm -rf "$tmp"
            fi
          done
          echo "chrome-sandbox permission fix completed (if applicable)"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CMBDevClaw-${{ matrix.platform }}-${{ steps.pkg.outputs.version }}-installer
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: warn

      - name: Upload unpacked (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: CMBDevClaw-win-unpacked-${{ steps.pkg.outputs.version }}
          path: dist/win-unpacked/

      - name: Upload unpacked (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: CMBDevClaw-linux-unpacked-${{ steps.pkg.outputs.version }}
          path: dist/linux-unpacked/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
