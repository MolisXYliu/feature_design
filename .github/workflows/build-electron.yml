name: Build Electron App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 支持手动触发

concurrency:
  group: build-electron-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            script: dist:win
          - os: ubuntu-latest
            platform: linux
            script: dist

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Decrypt .env for build
        run: node scripts/env-crypt.mjs decrypt-file .env
        env:
          ENV_ENCRYPTION_KEY: ${{ secrets.ENV_ENCRYPTION_KEY }}

      - name: Install dependencies (Windows with optional deps fallback)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm install --include=optional
          if (-not (Test-Path "node_modules/@rollup/rollup-win32-x64-msvc")) {
            Write-Host "Missing @rollup/rollup-win32-x64-msvc, retry with clean install..."
            Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
            Remove-Item -Force package-lock.json -ErrorAction SilentlyContinue
            npm install --include=optional
          }

      - name: Install dependencies (Linux with optional deps fallback)
        if: runner.os == 'Linux'
        run: |
          npm install --include=optional
          if [ ! -d "node_modules/@rollup/rollup-linux-x64-gnu" ]; then
            echo "Missing @rollup/rollup-linux-x64-gnu, retry with clean install..."
            rm -rf node_modules package-lock.json
            npm install --include=optional
          fi
          # no AppImage tooling required for deb-only builds

      # 显式为目标 Electron 版本重新编译 node-pty 原生模块。
      # 背景：node-pty 1.1.0 的 npm 包只带 darwin/win32 的 prebuilds，linux-x64 没有预编译二进制，
      # 必须现场编译出 build/Release/pty.node，否则运行时会报 "Failed to load native module: pty.node"。
      # 不依赖 package.json 的 postinstall（"electron-rebuild -f -w node-pty"）：
      # 那个二进制来自 electron-builder 的传递依赖 @electron/rebuild，postinstall 失败时
      # npm 不总会当致命错误处理，曾经沉默出过没有 pty.node 的坏包。
      # 这里显式跑，失败 CI 直接红；并用 Electron 的 headers 而非 Node 的，确保 ABI 对。
      # -v 对应 package.json build.electronVersion；升级 electron 时两处需同步。
      # Windows 不跑 rebuild：node-pty 自带 prebuilds/win32-x64/pty.node 可直接用，
      # rebuild 反而需要 Visual Studio Build Tools，徒增失败面。
      - name: Rebuild node-pty for Electron (Linux only)
        if: runner.os == 'Linux'
        run: |
          npx --yes @electron/rebuild -f -w node-pty -v 39.8.0
          echo "=== node-pty native binary check ==="
          ls -la node_modules/node-pty/build/Release/ 2>&1 || echo "(no build/Release)"
          test -f node_modules/node-pty/build/Release/pty.node \
            || (echo "ERROR: node-pty pty.node missing after rebuild" && exit 1)

      # Windows 侧仅校验 prebuild 已存在，不重新编译
      - name: Verify node-pty prebuild (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "=== node-pty prebuilds/win32-x64 ==="
          ls -la node_modules/node-pty/prebuilds/win32-x64/ 2>&1 || echo "(missing)"
          test -f node_modules/node-pty/prebuilds/win32-x64/pty.node \
            || (echo "ERROR: node-pty win32-x64 prebuild missing" && exit 1)

      - name: Build
        run: npm run build

      - name: Get package version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package (Linux x64)
        if: matrix.platform == 'linux'
        run: |
          npx electron-builder --linux deb --x64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Other platforms)
        if: matrix.platform != 'linux'
        run: |
          npx electron-builder --${{ matrix.platform }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: CMBDevClaw-${{ matrix.platform }}-${{ steps.pkg.outputs.version }}-installer
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          if-no-files-found: warn

      - name: Upload unpacked (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: CMBDevClaw-win-unpacked-${{ steps.pkg.outputs.version }}
          path: dist/win-unpacked/

      - name: Package Linux unpacked as tar.gz (preserves file permissions)
        if: matrix.platform == 'linux'
        run: |
          tar -czf CMBDevClaw-linux-unpacked-${{ steps.pkg.outputs.version }}.tar.gz -C dist/linux-unpacked .

      - name: Upload unpacked (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: CMBDevClaw-linux-unpacked-${{ steps.pkg.outputs.version }}
          path: CMBDevClaw-linux-unpacked-${{ steps.pkg.outputs.version }}.tar.gz

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
